<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - LAVANDERIA ERP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">LAVANDERIA</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="sucursales.html">Sucursales</a></li>
                    <li><a href="#" class="active-nav">Mi Cuenta</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="#" class="btn-nuevo-pedido">Registrar nuevo pedido</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="register-main">
        <div class="register-card">
            <h1 class="main-title">Crea tu cuenta</h1>
            <p class="register-subtitle">Únete a nosotros para gestionar tus servicios de lavandería.</p>

            <form action="" class="register-form">
                
                <div class="form-row-2">
                    <div class="floating-group">
                        <input type="text" id="nombre" placeholder=" " required>
                        <label for="nombre">Nombre *</label>
                    </div>
                    <div class="floating-group">
                        <input type="text" id="apellidos" placeholder=" " required>
                        <label for="apellidos">Apellidos *</label>
                    </div>
                </div>

                <div class="floating-group">
                    <input type="email" id="correo" placeholder=" " required>
                    <label for="correo">Correo electrónico *</label>
                </div>

                <div class="form-row-2">
                    <div class="floating-group">
                        <input type="tel" id="telefono" placeholder=" ">
                        <label for="telefono">Teléfono</label>
                    </div>
                    <div class="floating-group">
                        <input type="text" id="direccion" placeholder=" ">
                        <label for="direccion">Dirección</label>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="floating-group">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password">Contraseña *</label>
                    </div>
                    <div class="floating-group">
                        <input type="password" id="confirm-password" placeholder=" " required>
                        <label for="confirm-password">Confirmar contraseña *</label>
                    </div>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 1rem;">Registrarme</button>
                
                <p class="login-link">¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </form>
        </div>
    </main>

</body>
</html>
