<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucursales - LAVANDERIA ERP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">LAVANDERIA</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="paquetes.html">Servicios</a></li>
                    <li><a href="sucursales.html" class="active-nav">Sucursales</a></li>
                    <li><a href="dashboard.html" >Mi Cuenta</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="nuevo-pedido.html" class="btn-nuevo-pedido">Nuevo pedido</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="branches-main">
        <h1 class="main-title">Directorio de Sucursales</h1>

        <div class="branches-grid" id="branches-container">
            <p style="text-align: center; width: 100%; color: #666;">Cargando sucursales...</p>
        </div>
    </main>

    <div class="container-sucursales">
        <a href="disponibilidad.html" class="btn-primary">Revisar Disponibilidad</a>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('branches-container');
        
        try {
            // Hacemos la petición al nuevo endpoint
            const respuesta = await fetch('/api/sucursales');
            const sucursales = await respuesta.json();
            
            container.innerHTML = ''; // Limpiamos el texto de "Cargando..."
            
            // Validamos si hay sucursales registradas
            if (!respuesta.ok) throw new Error("Error en la respuesta del servidor");
            
            if (sucursales.length === 0) {
                container.innerHTML = '<p style="text-align: center; width: 100%;">No hay sucursales disponibles por el momento.</p>';
                return;
            }

            // Recorremos los datos de MySQL y generamos el HTML
            sucursales.forEach(sucursal => {
                const article = document.createElement('article');
                article.className = 'branch-card';
                
                // Mantenemos los badges y el texto de horario fijos para respetar tu diseño, 
                // pero inyectamos los datos reales de nombre, dirección y teléfono.
                article.innerHTML = `
                    <h2 class="branch-name">${sucursal.nombre_sucursal}</h2>
                    <div class="branch-details">
                        <p><strong>📍 Dirección:</strong> ${sucursal.direccion_completa}</p>
                        <p><strong>📞 Teléfono:</strong> ${sucursal.telefono_contacto || 'No disponible'}</p>
                        <p><strong>✉️ Correo:</strong> <a href="mailto:info@lavanderia.com">info@lavanderia.com</a></p>
                        <p class="branch-hours"><strong>🕒 Horario:</strong> L - S de 8:00 a 21:00 y D de 10:00 a 16:00</p>
                    </div>
                    
                    <div class="branch-services-badges">
                        <span class="badge">Lavado</span>
                        <span class="badge">Tintorería</span>
                        <span class="badge">Express</span>
                    </div>
                `;
                
                container.appendChild(article);
            });
            
        } catch (error) {
            console.error('Error al cargar las sucursales:', error);
            container.innerHTML = '<p style="text-align: center; width: 100%; color: #e74c3c;">Ocurrió un error al cargar el directorio de sucursales. Intenta más tarde.</p>';
        }
    });
    </script>
</body>
</html>
