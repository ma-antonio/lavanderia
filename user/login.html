<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - LAVANDERIA ERP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">LAVANDERIA</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="#">Sucursales</a></li>
                    <li><a href="#" class="active-nav">Mi Cuenta</a></li>
                    <li><a href="#">Contacto</a></li>
                    <li><a href="#" class="btn-nuevo-pedido">Nuevo pedido</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-main">
        <h1 class="main-title">Iniciar Sesión en LAVANDERIA</h1>

        <div class="form-card">
            <form action="" method="">
                <div class="form-row">
                    <div class="input-group">
                        <label for="username">Correo:</label>
                        <input type="text" id="login-correo" name="username" placeholder="correo@ejemplo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="login-password" name="password" placeholder="**********" required>
                    </div>
                </div>
                
                <p class="form-instruction">Mostrando formulario de inicio de sesión para el portal de gestión de lavandería.</p>
                
                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
        </div>
    </main>
<script>
// Archivo: user/login.html
document.querySelector('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const datos = {
        correo: document.getElementById('login-correo').value,
        password: document.getElementById('login-password').value
    };

    try {
        const respuesta = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        const resultado = await respuesta.json();

        if (respuesta.ok) {
            // Guardamos la sesión localmente
            localStorage.setItem('id_cliente', resultado.id_cliente);
            window.location.href = 'dashboard.html';
        } else {
            alert(resultado.error);
        }
    } catch (error) {
        alert("Error al intentar iniciar sesión.");
    }
});
</script>
</body>
</html>
