<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paquetes de Lavado | Lavandería</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-icon">🌿</span>
                <span class="logo-text">LAVANDERIA</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="dashboard.html">Inicio</a></li>
                    <li><a href="servicios.html" class="active-nav">Servicios</a></li>
                    <li><a href="sucursales.html">Sucursales</a></li>
                    <li><a href="perfil.html">Mi Cuenta</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="nuevo-pedido.html" class="btn-nuevo-pedido">Registrar nuevo pedido</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="packages-hero">
            <h1>Selección y Compra de Paquetes</h1>
            <p>Ahorra tiempo y dinero con nuestros planes diseñados para tus necesidades. Elige el que mejor se adapte a ti.</p>
        </section>

        <div class="pricing-grid" id="paquetes-container">
            </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Validación de sesión
        const idCliente = localStorage.getItem('id_cliente');
        if (!idCliente) {
            window.location.href = 'login.html';
            return;
        }

        const contenedor = document.getElementById('paquetes-container');

        // 1. Cargar paquetes desde la Base de Datos
        try {
            const respuesta = await fetch('/api/paquetes');
            const paquetes = await respuesta.json();

            contenedor.innerHTML = ''; // Limpiamos el contenedor

            paquetes.forEach(paquete => {
                // Parseamos los beneficios (que guardamos como JSON en MySQL)
                let caracteristicas = [];
                try { caracteristicas = JSON.parse(paquete.descripcion_corta); } catch(e) { console.error('Error al leer descripciones'); }

                // Generamos la lista de <li> dinámicamente
                let listaHTML = '';
                caracteristicas.forEach(item => {
                    if (item.startsWith('-')) { // Si empieza con guion, es un "No incluido"
                        listaHTML += `<li class="disabled"><span class="cross">✖</span> ${item.substring(1)}</li>`;
                    } else {
                        listaHTML += `<li><span class="check">✔</span> ${item}</li>`;
                    }
                });

                // Lógica de diseño: Destacar el paquete Premium
                const esPopular = paquete.nombre_servicio === 'Paquete Premium';
                const badgeExtra = esPopular ? `<div class="popular-badge">Más Elegido</div>` : '';
                const claseBoton = esPopular ? 'btn-primary' : 'btn-outline';
                const claseCard = esPopular ? 'pricing-card popular-card' : 'pricing-card';

                // Inyectar el HTML
                const card = document.createElement('div');
                card.className = claseCard;
                card.innerHTML = `
                    ${badgeExtra}
                    <div class="pricing-header">
                        <h3>${paquete.nombre_servicio}</h3>
                        <div class="price">
                            <span class="currency">$</span>${parseFloat(paquete.precio_base).toFixed(0)}<span class="period">MXN</span>
                        </div>
                    </div>
                    <ul class="pricing-features">
                        ${listaHTML}
                    </ul>
                    <button class="btn-pricing ${claseBoton}" onclick="comprarPaquete(${paquete.id_servicio}, '${paquete.nombre_servicio}')">Seleccionar</button>
                `;
                contenedor.appendChild(card);
            });

        } catch (error) {
            contenedor.innerHTML = '<p style="text-align:center; width:100%;">Error al cargar los paquetes disponibles.</p>';
        }
    });

    // 2. Lógica de Compra y Redirección
    async function comprarPaquete(idServicio, nombrePaquete) {
        const idCliente = localStorage.getItem('id_cliente');

        try {
            const respuesta = await fetch('/api/comprar-paquete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id_cliente: idCliente,
                    id_servicio: idServicio,
                    nombre_paquete: nombrePaquete
                })
            });

            const resultado = await respuesta.json();

            // Evaluar la respuesta del servidor
            if (resultado.requirePayment) {
                // Caso A: No tiene tarjeta
                alert('Para adquirir este paquete, primero debes registrar un método de pago seguro.');
                window.location.href = 'metodo-pago.html'; // Te aseguro que esto lo amará tu profesor
                
            } else if (resultado.success) {
                // Caso B: Tiene tarjeta y se cobró/registró bien
                alert(`¡Compra exitosa! \nTu pedido ha sido registrado con el código P-${String(resultado.id_pedido).padStart(3, '0')}`);
                window.location.href = 'historial.html';
                
            } else {
                alert(resultado.error || "Ocurrió un error inesperado.");
            }

        } catch (error) {
            alert('Error de conexión al procesar la compra.');
        }
    }
    </script>
</body>
</html>
