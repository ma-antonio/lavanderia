<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso ERP</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body class="admin-login-body">

    <div class="login-container">
        <div class="login-box">
            <h2>Acceso Sistema ERP</h2>
            <p>Ingrese sus credenciales operativas</p>
            
            <form action="">
                <div class="form-group">
                    <label for="emp-id">ID de Empleado</label>
                    <input type="text" id="emp-id" placeholder="EMP-XXX" required>
                </div>

                <div class="form-group">
                    <label for="emp-pass">Contraseña</label>
                    <input type="password" id="emp-pass" required>
                </div>

                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </div>

</body>
</html>
